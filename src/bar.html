<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #f6c90e;
            --radius: 50px;
            --font-size: 15px;
            --widget-width: 480px;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: transparent;
            overflow: hidden;
            padding: 36px 16px 16px;
            width: var(--widget-width);
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateX(-18px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .bottom-bar {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 85%, #000));
            border-radius: var(--radius);
            padding: 10px 8px 10px 16px;
            gap: 12px;
            animation: fadeSlideIn 0.4s ease both;
            position: relative;
            overflow: hidden;
        }

        .bottom-icon {
            font-size: 22px;
            line-height: 1;
        }

        .bottom-label {
            flex: 1;
            font-size: var(--font-size);
            font-weight: 900;
            color: #2d1a00;
            letter-spacing: 0.02em;
            transition: opacity 0.3s, transform 0.3s;
        }

        .bottom-label.hidden {
            opacity: 0;
            transform: translateY(-6px);
        }

        /* ── Donor name tag ── */
        .donor-tag {
            position: absolute;
            left: 52px;
            font-size: var(--font-size);
            font-weight: 900;
            color: #2d1a00;
            letter-spacing: 0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: calc(100% - 160px);
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        .donor-tag.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .bottom-amount {
            background: rgba(0,0,0,0.18);
            border-radius: var(--radius);
            padding: 6px 18px;
            font-size: var(--font-size);
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.02em;
        }

        /* ── Gain bubble (same pattern as .thank-you) ── */
        .bar-wrapper {
            position: relative;
        }

        .gain-bubble {
            position: absolute;
            right: 70px;
            top: -28px;
            background: white;
            color: #333;
            font-size: 13px;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 12px;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            pointer-events: none;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.3s, transform 0.3s;
            z-index: 10;
        }

        .gain-bubble.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes amountPop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .amount-pop { animation: amountPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .progress-wrap {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 4px;
            background: rgba(0,0,0,0.15);
        }

        .progress-fill {
            height: 100%;
            background: rgba(255,255,255,0.45);
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── Bar glow orbit ── */

        /* ── Glass theme ── */
        body.glass .bottom-bar {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 4px 24px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        body.glass .bottom-label,
        body.glass .donor-tag {
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        body.glass .bottom-amount {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }

        body.glass .gain-bubble {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
<div class="bar-wrapper">
    <div class="gain-bubble" id="gain-bubble"></div>
    <div class="bottom-bar">
    <span class="bottom-icon" id="bottom-icon">🏆</span>
    <span class="bottom-label" id="bottom-label">Objectifs communautaires</span>
    <span class="donor-tag" id="donor-tag"></span>
    <span class="bottom-amount" id="bottom-amount">BC 0 / 0</span>
    <div class="progress-wrap">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
</div>
</div>

<script>
    const DEFAULTS = {
        token:        '',
        startAmount:  0,
        subValue:     5,
        accentColor:  '#f6c90e',
        borderRadius: 50,
        fontSize:     15,
        widgetWidth:  480,
        scale:        1,
        barIcon:      '🏆',
        barLabel:     'Objectifs communautaires',
        currency:     'BC',
        donationEmoji: '💛',
        subEmoji:      '⭐',
        theme:        'dark',
        goals:        [],
    };

    function decode(raw) {
        const s = raw.replace(/-/g, '+').replace(/_/g, '/');
        const std = s + '='.repeat((4 - s.length % 4) % 4);
        return JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(std), c => c.charCodeAt(0))));
    }

    function loadConfig() {
        const raw = new URLSearchParams(window.location.search).get('config')
                    || localStorage.getItem('widgetConfig');
        if (!raw) return DEFAULTS;
        try {
            return { ...DEFAULTS, ...decode(raw) };
        } catch (e) {
            console.error('Invalid config:', e);
            return DEFAULTS;
        }
    }

    const cfg = loadConfig();

    // ?reset efface le montant persisté et repart de startAmount
    if (new URLSearchParams(window.location.search).has('reset')) {
        localStorage.removeItem('goalAmount');
    }

    document.documentElement.style.setProperty('--accent',       cfg.accentColor);
    document.documentElement.style.setProperty('--radius',       cfg.borderRadius + 'px');
    document.documentElement.style.setProperty('--font-size',    cfg.fontSize     + 'px');
    document.documentElement.style.setProperty('--widget-width', cfg.widgetWidth  + 'px');
    if (cfg.scale !== 1) {
        document.body.style.transform       = `scale(${cfg.scale})`;
        document.body.style.transformOrigin = 'top left';
        document.body.style.overflow        = 'visible';
    }
    document.getElementById('bottom-icon').textContent  = cfg.barIcon;
    document.getElementById('bottom-label').textContent = cfg.barLabel;
    if (cfg.theme === 'glass') document.body.classList.add('glass');

    const GOAL_TARGET = cfg.goals.length
        ? Math.max(...cfg.goals.map(g => g.threshold))
        : 0;

    let currentAmount = parseFloat(localStorage.getItem('goalAmount') ?? cfg.startAmount);

    // ── GAIN ANIMATION ─────────────────────────────────────────
    function showGain(gain) {
        const bubble = document.getElementById('gain-bubble');
        bubble.textContent = '+' + (Number.isInteger(gain) ? gain : gain.toFixed(2)) + ' ' + cfg.currency;
        bubble.classList.add('visible');
        clearTimeout(bubble._hideTimer);
        bubble._hideTimer = setTimeout(() => bubble.classList.remove('visible'), 3000);

        const amountEl = document.getElementById('bottom-amount');
        amountEl.classList.remove('amount-pop');
        void amountEl.offsetWidth;
        amountEl.classList.add('amount-pop');
        amountEl.addEventListener('animationend', () => amountEl.classList.remove('amount-pop'), { once: true });
    }

    function updateWidget() {
        localStorage.setItem('goalAmount', currentAmount);

        const pct = GOAL_TARGET ? Math.min((currentAmount / GOAL_TARGET) * 100, 100) : 0;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('bottom-amount').textContent =
            cfg.currency + ' ' + Math.floor(currentAmount) + ' / ' + GOAL_TARGET;
    }

    updateWidget();

    // ── DONOR NAME ─────────────────────────────────────────────
    function showDonor(name, type) {
        const tag   = document.getElementById('donor-tag');
        const label = document.getElementById('bottom-label');
        const icon  = type === 'sub' ? cfg.subEmoji : cfg.donationEmoji;
        tag.textContent = icon + ' ' + name;
        label.classList.add('hidden');
        tag.classList.add('visible');
        clearTimeout(tag._hideTimer);
        tag._hideTimer = setTimeout(() => {
            tag.classList.remove('visible');
            label.classList.remove('hidden');
        }, 5000);
    }

    if (cfg.token) {
        const streamlabs = io(`https://sockets.streamlabs.com?token=${cfg.token}`, { transports: ['websocket'] });

        streamlabs.on('event', (eventData) => {
            let gain = 0;
            if (eventData.type === 'donation') {
                eventData.message.forEach(msg => {
                    const amt = parseFloat(msg.amount);
                    currentAmount += amt;
                    gain += amt;
                    if (msg.from || msg.name) showDonor(msg.from || msg.name, 'donation');
                });
            }
            if (eventData.for === 'twitch_account' || eventData.for === 'youtube_account') {
                if (eventData.type === 'subscription' || eventData.type === 'resub') {
                    eventData.message.forEach(msg => {
                        currentAmount += cfg.subValue;
                        gain += cfg.subValue;
                        if (msg.name) showDonor(msg.name, 'sub');
                    });
                }
            }
            if (gain > 0) showGain(gain);
            updateWidget();
        });
    }

</script>
</body>
</html>
