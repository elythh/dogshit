<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #f6c90e;
            --radius: 50px;
            --font-size: 15px;
            --widget-width: 480px;
            --accent-dark: rgb(209,171,12);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: transparent;
            overflow: visible;
            padding: 36px 16px 16px;
            width: var(--widget-width);
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateX(-18px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .bar-wrapper {
            position: relative;
        }

        .bottom-bar {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            border-radius: var(--radius);
            padding: 10px 8px 10px 16px;
            gap: 12px;
            animation: fadeSlideIn 0.4s ease both;
            position: relative;
            overflow: hidden;
        }

        .bottom-icon {
            font-size: 22px;
            line-height: 1;
        }

        .bottom-label {
            flex: 1;
            font-size: var(--font-size);
            font-weight: 900;
            color: #2d1a00;
            letter-spacing: 0.02em;
            transition: opacity 0.3s, transform 0.3s;
        }

        .bottom-label.hidden {
            opacity: 0;
            transform: translateY(-6px);
        }

        .donor-tag {
            position: absolute;
            left: 52px;
            font-size: var(--font-size);
            font-weight: 900;
            color: #2d1a00;
            letter-spacing: 0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: calc(100% - 180px);
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        .donor-tag.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .timer-display {
            background: rgba(0,0,0,0.18);
            border-radius: var(--radius);
            padding: 6px 18px;
            font-size: calc(var(--font-size) * 1.15);
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.08em;
            font-variant-numeric: tabular-nums;
            min-width: 88px;
            text-align: center;
            flex-shrink: 0;
            transition: color 0.3s;
        }

        .timer-display.expired {
            color: rgba(255,255,255,0.45);
        }

        @keyframes timePop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.18); }
            100% { transform: scale(1); }
        }

        .time-pop { animation: timePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Gain bubble */
        .gain-bubble {
            position: absolute;
            right: 70px;
            top: -28px;
            background: white;
            color: #333;
            font-size: 13px;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 12px;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            pointer-events: none;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.3s, transform 0.3s;
            z-index: 10;
        }

        .gain-bubble.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── 10× lucky overlay ── */
        @keyframes luckyPop {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4) rotate(-8deg); }
            18%  { opacity: 1; transform: translate(-50%, -50%) scale(1.25) rotate(4deg); }
            38%  { transform: translate(-50%, -50%) scale(0.95) rotate(-2deg); }
            52%  { transform: translate(-50%, -50%) scale(1.08) rotate(1deg); }
            65%  { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            80%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1) rotate(0deg); }
        }

        @keyframes luckyShine {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
            30%  { opacity: 0.55; }
            70%  { opacity: 0.35; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
        }

        @keyframes luckyBarFlash {
            0%, 100% { filter: brightness(1); }
            15%      { filter: brightness(2.2); }
            30%      { filter: brightness(1.1); }
            45%      { filter: brightness(1.8); }
            60%      { filter: brightness(1); }
        }

        .lucky-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
        }

        .lucky-overlay.active { display: block; }

        .lucky-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: luckyShine 2.2s ease forwards;
        }

        .lucky-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Nunito', sans-serif;
            font-size: 96px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -2px;
            text-shadow:
                0 0 40px var(--accent),
                0 0 80px var(--accent),
                0 4px 0 rgba(0,0,0,0.4);
            white-space: nowrap;
            animation: luckyPop 2.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            line-height: 1;
        }

        .lucky-bar-flash {
            animation: luckyBarFlash 0.7s ease both;
        }

        /* ── Glass theme ── */
        body.glass .bottom-bar {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 4px 24px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        body.glass .bottom-label,
        body.glass .donor-tag {
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        body.glass .timer-display {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }

        body.glass .gain-bubble {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
<div class="lucky-overlay" id="lucky-overlay">
    <div class="lucky-glow"></div>
    <div class="lucky-label">🍀 3×</div>
</div>
<div class="bar-wrapper">
    <div class="gain-bubble" id="gain-bubble"></div>
    <div class="bottom-bar">
        <span class="bottom-icon" id="bottom-icon">⏱</span>
        <span class="bottom-label" id="bottom-label">Countdown</span>
        <span class="donor-tag" id="donor-tag"></span>
        <span class="timer-display" id="timer-display">00:00</span>
    </div>
</div>

<script>
    const DEFAULTS = {
        token:                '',
        startSeconds:         600,
        subSeconds:           60,
        donationSeconds:      10,
        accentColor:          '#f6c90e',
        countdownAccentColor: '',
        borderRadius:         50,
        fontSize:        15,
        widgetWidth:     480,
        scale:           1,
        countdownIcon:   '⏱',
        countdownLabel:  'Countdown',
        subEmoji:        '⭐',
        donationEmoji:   '💛',
        theme:           'dark',
    };

    function decode(raw) {
        const s = raw.replace(/-/g, '+').replace(/_/g, '/');
        const std = s + '='.repeat((4 - s.length % 4) % 4);
        return JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(std), c => c.charCodeAt(0))));
    }

    function loadConfig() {
        const raw = new URLSearchParams(window.location.search).get('config')
                    || localStorage.getItem('widgetConfig');
        if (!raw) return DEFAULTS;
        try {
            return { ...DEFAULTS, ...decode(raw) };
        } catch (e) {
            console.error('Invalid config:', e);
            return DEFAULTS;
        }
    }

    const cfg = loadConfig();

    function setAccentVars(hex) {
        if (hex.length === 4) hex = '#' + hex[1]+hex[1] + hex[2]+hex[2] + hex[3]+hex[3];
        const r = parseInt(hex.slice(1,3), 16);
        const g = parseInt(hex.slice(3,5), 16);
        const b = parseInt(hex.slice(5,7), 16);
        document.documentElement.style.setProperty('--accent-dark',
            `rgb(${Math.round(r*.85)},${Math.round(g*.85)},${Math.round(b*.85)})`);
    }

    if (new URLSearchParams(window.location.search).has('reset')) {
        localStorage.removeItem('countdownEndTime');
        localStorage.removeItem('countdownStartSeconds');
    }

    const accentHex = cfg.countdownAccentColor || cfg.accentColor;
    document.documentElement.style.setProperty('--accent', accentHex);
    setAccentVars(accentHex);
    document.documentElement.style.setProperty('--radius',       cfg.borderRadius + 'px');
    document.documentElement.style.setProperty('--font-size',    cfg.fontSize     + 'px');
    document.documentElement.style.setProperty('--widget-width', cfg.widgetWidth  + 'px');
    if (cfg.scale !== 1) {
        document.body.style.transform       = `scale(${cfg.scale})`;
        document.body.style.transformOrigin = 'top left';
        document.body.style.overflow        = 'visible';
    }
    document.getElementById('bottom-icon').textContent  = cfg.countdownIcon;
    document.getElementById('bottom-label').textContent = cfg.countdownLabel;
    if (cfg.theme === 'glass') document.body.classList.add('glass');

    // ── Timer state ─────────────────────────────────────────────
    // endTime is an absolute Date.now() timestamp (ms) at which the timer hits zero.
    const storedEnd   = parseFloat(localStorage.getItem('countdownEndTime'));
    const storedStart = parseFloat(localStorage.getItem('countdownStartSeconds'));

    let endTime = (!isNaN(storedEnd) && storedStart === cfg.startSeconds)
        ? storedEnd
        : Date.now() + cfg.startSeconds * 1000;

    localStorage.setItem('countdownEndTime',      endTime);
    localStorage.setItem('countdownStartSeconds', cfg.startSeconds);

    function addSeconds(secs) {
        endTime = Math.max(endTime, Date.now()) + secs * 1000;
        localStorage.setItem('countdownEndTime', endTime);
    }

    function formatTime(ms) {
        const totalSecs = Math.max(0, Math.floor(ms / 1000));
        const h = Math.floor(totalSecs / 3600);
        const m = Math.floor((totalSecs % 3600) / 60);
        const s = totalSecs % 60;
        if (h > 0) {
            return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }
        return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    const timerEl = document.getElementById('timer-display');

    function tick() {
        const remaining = endTime - Date.now();
        timerEl.textContent = formatTime(remaining);
        timerEl.classList.toggle('expired', remaining <= 0);
    }

    tick();
    setInterval(tick, 250);

    // ── Lucky 10× ────────────────────────────────────────────────
    function showLucky() {
        const overlay = document.getElementById('lucky-overlay');
        const bar     = document.querySelector('.bottom-bar');

        // Reset by cloning the overlay (re-triggers CSS animation)
        const fresh = overlay.cloneNode(true);
        overlay.parentNode.replaceChild(fresh, overlay);
        fresh.classList.add('active');

        bar.classList.remove('lucky-bar-flash');
        void bar.offsetWidth;
        bar.classList.add('lucky-bar-flash');

        setTimeout(() => {
            fresh.classList.remove('active');
            bar.classList.remove('lucky-bar-flash');
        }, 2200);
    }

    // ── Gain animation ───────────────────────────────────────────
    function showGain(secs) {
        const bubble = document.getElementById('gain-bubble');
        bubble.textContent = '+' + secs + 's';
        bubble.classList.add('visible');
        clearTimeout(bubble._hideTimer);
        bubble._hideTimer = setTimeout(() => bubble.classList.remove('visible'), 3000);

        timerEl.classList.remove('time-pop');
        void timerEl.offsetWidth;
        timerEl.classList.add('time-pop');
        timerEl.addEventListener('animationend', () => timerEl.classList.remove('time-pop'), { once: true });
    }

    // ── Donor name ───────────────────────────────────────────────
    function showDonor(name, type) {
        const tag   = document.getElementById('donor-tag');
        const label = document.getElementById('bottom-label');
        const icon  = type === 'sub' ? cfg.subEmoji : cfg.donationEmoji;
        tag.textContent = icon + ' ' + name;
        label.classList.add('hidden');
        tag.classList.add('visible');
        clearTimeout(tag._hideTimer);
        tag._hideTimer = setTimeout(() => {
            tag.classList.remove('visible');
            label.classList.remove('hidden');
        }, 5000);
    }

    if (cfg.token) {
        const streamlabs = io(`https://sockets.streamlabs.com?token=${cfg.token}`, { transports: ['websocket'] });

        streamlabs.on('event', (eventData) => {
            let gained = 0;

            if (eventData.type === 'donation') {
                eventData.message.forEach(msg => {
                    const amt     = parseFloat(msg.amount);
                    const base    = Math.round(amt * cfg.donationSeconds);
                    const lucky   = Math.random() < 0.05;
                    const added   = lucky ? base * 3 : base;
                    addSeconds(added);
                    gained += added;
                    if (lucky) showLucky();
                    if (msg.from || msg.name) showDonor(msg.from || msg.name, 'donation');
                });
            }

            if (eventData.for === 'twitch_account' || eventData.for === 'youtube_account') {
                if (eventData.type === 'subscription' || eventData.type === 'resub') {
                    eventData.message.forEach(msg => {
                        const lucky = Math.random() < 0.05;
                        const added = lucky ? cfg.subSeconds * 3 : cfg.subSeconds;
                        addSeconds(added);
                        gained += added;
                        if (lucky) showLucky();
                        if (msg.name) showDonor(msg.name, 'sub');
                    });
                }
            }

            if (gained > 0) showGain(gained);
        });
    }
</script>
</body>
</html>
