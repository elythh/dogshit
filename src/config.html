<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Configurator</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #0f0f13;
            color: #e8e8f0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .page {
            max-width: 640px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: #f6c90e;
        }

        h1 span {
            color: #fff;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .card-title {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
        }

        .field input {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        .field input:focus {
            border-color: #f6c90e;
        }

        .field input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .field { flex: 1; }

        /* Goals list */
        #goals-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .goal-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .goal-item input[type="text"] {
            flex: 1;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .goal-item input[type="text"]:focus { border-color: #f6c90e; }
        .goal-item input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }

        .goal-item input[type="number"] {
            width: 90px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }

        .goal-item input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .goal-item input[type="number"]:focus { border-color: #f6c90e; }
        .goal-item input[type="number"]::placeholder { color: rgba(255,255,255,0.2); }

        .btn-remove {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            background: transparent;
            color: rgba(255,255,255,0.35);
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-remove:hover {
            background: rgba(255,80,80,0.15);
            color: #ff6b6b;
            border-color: rgba(255,80,80,0.3);
        }

        .btn-add {
            align-self: flex-start;
            background: transparent;
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-add:hover {
            border-color: #f6c90e;
            color: #f6c90e;
        }

        /* Output */
        .output-box {
            position: relative;
        }

        .output-label {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 8px;
        }

        textarea#output {
            width: 100%;
            min-height: 90px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #a8e6a3;
            resize: vertical;
            outline: none;
            word-break: break-all;
        }

        .url-preview {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            word-break: break-all;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px 12px;
        }

        .url-preview span {
            color: #f6c90e;
        }

        .btn-copy {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #f6c90e, #f0a500);
            font-family: inherit;
            font-size: 15px;
            font-weight: 900;
            color: #2d1a00;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.02em;
        }

        .btn-copy:hover { opacity: 0.92; }
        .btn-copy:active { transform: scale(0.98); }
        .btn-copy.copied { background: linear-gradient(90deg, #4caf7d, #3a9463); color: #fff; }
    </style>
</head>
<body>
<div class="page">

    <h1>🏆 Widget <span>Configurator</span></h1>

    <!-- Settings -->
    <div class="card">
        <div class="card-title">Settings</div>

        <div class="field">
            <label for="token">Streamlabs Socket Token</label>
            <input type="text" id="token" placeholder="Paste your token here…">
        </div>

        <div class="row">
            <div class="field">
                <label for="startAmount">Start Amount ($)</label>
                <input type="number" id="startAmount" placeholder="0" min="0" value="0">
            </div>
            <div class="field">
                <label for="subValue">Sub Value ($)</label>
                <input type="number" id="subValue" placeholder="5" min="0" value="5">
            </div>
        </div>
    </div>

    <!-- Goals -->
    <div class="card">
        <div class="card-title">Goals</div>

        <div id="goals-list"></div>

        <button class="btn-add" id="btn-add">+ Add goal</button>
    </div>

    <!-- Output -->
    <div class="card">
        <div class="card-title">Output</div>

        <div class="output-box">
            <div class="output-label">Base64 config string</div>
            <textarea id="output" readonly></textarea>
        </div>

        <div class="output-box">
            <div class="output-label">OBS browser source URL</div>
            <div class="url-preview" id="url-preview">
                http://your-host/<span>?config=</span><span id="url-suffix">…</span>
            </div>
        </div>

        <button class="btn-copy" id="btn-copy">Copy base64 string</button>
    </div>

</div>

<script>
    const $ = id => document.getElementById(id);

    // ── Goal rows ──────────────────────────────────────────────
    function makeGoalRow(label = '', threshold = '') {
        const item = document.createElement('div');
        item.className = 'goal-item';
        item.innerHTML = `
            <input type="text"   placeholder="Goal label…" value="${label}">
            <input type="number" placeholder="$" min="0" value="${threshold}">
            <button class="btn-remove" title="Remove">×</button>
        `;
        item.querySelector('.btn-remove').addEventListener('click', () => {
            item.remove();
            generate();
        });
        item.querySelectorAll('input').forEach(el => el.addEventListener('input', generate));
        return item;
    }

    function addGoal(label, threshold) {
        $('goals-list').appendChild(makeGoalRow(label, threshold));
        generate();
    }

    $('btn-add').addEventListener('click', () => addGoal());

    // Default goals
    [
        { label: 'Play Horror Game (Lights Off)', threshold: 200 },
        { label: 'Let Chat Write Tweet',          threshold: 250 },
        { label: 'Read Old Tumblr Account',       threshold: 300 },
        { label: 'Dye Hair',                      threshold: 500 },
        { label: 'Cursed Eating Challenge',       threshold: 600 },
    ].forEach(g => addGoal(g.label, g.threshold));

    // ── Generate ───────────────────────────────────────────────
    function generate() {
        const goals = [...$('goals-list').querySelectorAll('.goal-item')].map(item => {
            const [labelEl, thresholdEl] = item.querySelectorAll('input');
            return { label: labelEl.value.trim(), threshold: Number(thresholdEl.value) || 0 };
        }).filter(g => g.label);

        const cfg = {
            token:       $('token').value.trim(),
            startAmount: Number($('startAmount').value) || 0,
            subValue:    Number($('subValue').value) || 5,
            goals,
        };

        const b64 = btoa(JSON.stringify(cfg));
        $('output').value     = b64;
        $('url-suffix').textContent = b64;
    }

    // Wire up settings inputs
    ['token', 'startAmount', 'subValue'].forEach(id => {
        $(id).addEventListener('input', generate);
    });

    generate();

    // ── Copy ───────────────────────────────────────────────────
    $('btn-copy').addEventListener('click', () => {
        navigator.clipboard.writeText($('output').value);
        const btn = $('btn-copy');
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = 'Copy base64 string';
            btn.classList.remove('copied');
        }, 2000);
    });
</script>
</body>
</html>
