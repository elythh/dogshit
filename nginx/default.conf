server {
    listen 80;
    server_name _;

    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    # Allow embedding in OBS browser source (no X-Frame-Options restriction)
    add_header X-Frame-Options "";
    add_header Content-Security-Policy "";

    # Cache static assets, no-cache the HTML so updates are reflected immediately
    location = / {
        try_files /config.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /widget {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /bar {
        try_files /bar.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
