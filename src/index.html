<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #f6c90e;
            --radius: 50px;
            --font-size: 15px;
            --widget-width: 480px;
            --row-gap: 10px;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: transparent;
            overflow: hidden;
            padding: 28px 16px 16px;
            width: var(--widget-width);
        }

        .widget {
            display: flex;
            flex-direction: column;
            gap: var(--row-gap);
        }

        /* ── Goal Row ── */
        .goal-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(
                to right,
                color-mix(in srgb, var(--accent) 28%, transparent) var(--progress, 0%),
                rgba(255,255,255,0.07) var(--progress, 0%)
            );
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: var(--radius);
            padding: 10px 20px 10px 14px;
            animation: fadeSlideIn 0.4s ease both;
            position: relative;
            overflow: visible;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateX(-18px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── Near goal ── */
        @keyframes nearPulse {
            0%, 100% {
                transform: scale(1.04);
                box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 50%, transparent),
                            0 0 12px color-mix(in srgb, var(--accent) 20%, transparent);
            }
            50% {
                transform: scale(1.07);
                box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 60%, transparent),
                            0 0 28px color-mix(in srgb, var(--accent) 35%, transparent);
            }
        }

        .goal-row.near {
            border-color: var(--accent);
            z-index: 1;
            animation: nearPulse 1.4s ease-in-out infinite !important;
        }

        .goal-row.near .goal-label {
            color: var(--accent);
        }

        .goal-row.near .goal-amount {
            color: var(--accent);
        }

        .goal-row.done {
            border-color: rgba(255,255,255,0.05);
            opacity: 0.45;
            filter: saturate(0.3);
            transform: scale(0.97);
        }

        .goal-row.done .goal-label {
            text-decoration: line-through;
        }

        /* Radio circle */
        .radio {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.35);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .goal-row.done .radio {
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 13%, transparent);
        }

        .radio-inner {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: scale(0.4);
        }

        .goal-row.done .radio-inner {
            opacity: 1;
            transform: scale(1);
        }

        /* Label */
        .goal-label {
            flex: 1;
            font-size: var(--font-size);
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Amount badge */
        .goal-amount {
            font-size: var(--font-size);
            font-weight: 800;
            color: #fff;
            opacity: 0.9;
            white-space: nowrap;
        }

        /* Thank You bubble */
        .thank-you {
            position: absolute;
            right: 70px;
            top: -22px;
            background: white;
            color: #333;
            font-size: 12px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 12px;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            pointer-events: none;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.3s, transform 0.3s;
        }

        .thank-you::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-bottom: none;
            border-top-color: white;
        }

        .thank-you.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Bottom Bar ── */
        .bottom-bar {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 85%, #000));
            border-radius: var(--radius);
            padding: 10px 8px 10px 16px;
            gap: 12px;
            animation: fadeSlideIn 0.4s ease 0.35s both;
            margin-top: 2px;
            position: relative;
            overflow: hidden;
        }

        .bottom-icon {
            font-size: 22px;
            line-height: 1;
        }

        .bottom-label {
            flex: 1;
            font-size: var(--font-size);
            font-weight: 900;
            color: #2d1a00;
            letter-spacing: 0.02em;
            transition: opacity 0.3s, transform 0.3s;
        }

        .bottom-label.hidden {
            opacity: 0;
            transform: translateY(-6px);
        }

        /* ── Donor name tag ── */
        .donor-tag {
            position: absolute;
            left: 52px;
            font-size: var(--font-size);
            font-weight: 900;
            color: #2d1a00;
            letter-spacing: 0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: calc(100% - 160px);
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        .donor-tag.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .bottom-amount {
            background: rgba(0,0,0,0.18);
            border-radius: var(--radius);
            padding: 6px 18px;
            font-size: var(--font-size);
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.02em;
        }

        /* ── Light theme ── */
        body.light .goal-row {
            background: rgba(255,255,255,0.82);
            border-color: rgba(0,0,0,0.08);
        }

        body.light .goal-row.done {
            background: rgba(200,200,200,0.4);
            border-color: rgba(0,0,0,0.04);
        }

        body.light .goal-label,
        body.light .goal-amount {
            color: #1a1a1a;
        }

        body.light .goal-row.near .goal-label,
        body.light .goal-row.near .goal-amount {
            color: color-mix(in srgb, var(--accent) 80%, #000);
        }

        body.light .radio {
            border-color: rgba(0,0,0,0.22);
        }

        body.light .thank-you {
            background: #1a1a1a;
            color: #fff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        body.light .thank-you::after {
            border-top-color: #1a1a1a;
        }

        /* ── Glass theme ── */
        body.glass .goal-row {
            background: linear-gradient(
                to right,
                color-mix(in srgb, var(--accent) 22%, rgba(255,255,255,0.12)) var(--progress, 0%),
                rgba(255,255,255,0.08) var(--progress, 0%)
            );
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 4px 24px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        body.glass .goal-row.done {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.08);
        }

        body.glass .goal-label,
        body.glass .goal-amount {
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        body.glass .goal-row.near .goal-label,
        body.glass .goal-row.near .goal-amount {
            color: var(--accent);
        }

        body.glass .radio {
            border-color: rgba(255,255,255,0.4);
        }

        body.glass .thank-you {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }

        body.glass .thank-you::after {
            border-top-color: rgba(255,255,255,0.15);
        }

        body.glass .bottom-bar {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 4px 24px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        body.glass .bottom-label,
        body.glass .donor-tag {
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        body.glass .bottom-amount {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }

        body.glass .gain-bubble {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* ── Confetti ── */
        .confetti-piece {
            position: absolute;
            pointer-events: none;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0%   { transform: translateY(0)    rotate(0deg)   scaleX(1); opacity: 1; }
            80%  { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) scaleX(0.4); opacity: 0; }
        }

        /* ── Gain bubble (same pattern as .thank-you) ── */
        .bar-wrapper {
            position: relative;
        }

        .gain-bubble {
            position: absolute;
            right: 70px;
            top: -28px;
            background: white;
            color: #333;
            font-size: 13px;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 12px;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            pointer-events: none;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.3s, transform 0.3s;
            z-index: 10;
        }

        .gain-bubble.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes amountPop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .amount-pop { animation: amountPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Thin progress line at bottom of bar */
        .progress-wrap {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 4px;
            background: rgba(0,0,0,0.15);
        }

        .progress-fill {
            height: 100%;
            background: rgba(255,255,255,0.45);
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }


    </style>
</head>
<body>
<div class="widget" id="widget">
    <!-- Goals are rendered by JS from the ?config= param -->

    <div class="bar-wrapper">
        <div class="gain-bubble" id="gain-bubble"></div>
        <div class="bottom-bar">
        <span class="bottom-icon" id="bottom-icon">🏆</span>
        <span class="bottom-label" id="bottom-label">Objectifs communautaires</span>
        <span class="donor-tag" id="donor-tag"></span>
        <span class="bottom-amount" id="bottom-amount">BC 0 / 0</span>
        <div class="progress-wrap">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
    </div>
    </div>
</div>

<script>
    // ── CONFIG ─────────────────────────────────────────────────
    // Pass config as a base64-encoded JSON string in the URL:
    //   ?config=<base64(JSON)>
    //
    // Config shape:
    // {
    //   "token":       "YOUR_STREAMLABS_TOKEN",
    //   "startAmount": 0,          // pre-seed the counter (default: 0)
    //   "subValue":    5,          // $ value per subscription (default: 5)
    //   "goals": [
    //     { "label": "Play Horror Game", "threshold": 200 },
    //     { "label": "Dye Hair",         "threshold": 500 }
    //   ]
    // }
    //
    // goalTarget is derived automatically from the highest threshold.
    //
    // Generate the base64 string at https://twitch.elyth.xyz/config

    const DEFAULTS = {
        token:        '',
        startAmount:  0,
        subValue:     5,
        accentColor:  '#f6c90e',
        borderRadius: 50,
        fontSize:     15,
        widgetWidth:  480,
        rowGap:       10,
        scale:        1,
        barIcon:      '🏆',
        barLabel:     'Objectifs communautaires',
        currency:     'BC',
        thankYouText: 'Merci !',
        donationEmoji: '💛',
        subEmoji:      '⭐',
        theme:        'dark',
        goals:        [],
    };

    function decode(raw) {
        const s = raw.replace(/-/g, '+').replace(/_/g, '/');
        const std = s + '='.repeat((4 - s.length % 4) % 4);
        return JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(std), c => c.charCodeAt(0))));
    }

    function loadConfig() {
        const raw = new URLSearchParams(window.location.search).get('config')
                    || localStorage.getItem('widgetConfig');
        if (!raw) return DEFAULTS;
        try {
            return { ...DEFAULTS, ...decode(raw) };
        } catch (e) {
            console.error('Invalid config:', e);
            return DEFAULTS;
        }
    }

    const cfg = loadConfig();

    // ?reset efface le montant persisté et repart de startAmount
    if (new URLSearchParams(window.location.search).has('reset')) {
        localStorage.removeItem('goalAmount');
    }

    document.documentElement.style.setProperty('--accent',       cfg.accentColor);
    document.documentElement.style.setProperty('--radius',       cfg.borderRadius + 'px');
    document.documentElement.style.setProperty('--font-size',    cfg.fontSize     + 'px');
    document.documentElement.style.setProperty('--widget-width', cfg.widgetWidth  + 'px');
    document.documentElement.style.setProperty('--row-gap',      cfg.rowGap       + 'px');
    if (cfg.scale !== 1) {
        document.body.style.transform       = `scale(${cfg.scale})`;
        document.body.style.transformOrigin = 'top left';
        document.body.style.overflow        = 'visible';
    }
    document.getElementById('bottom-icon').textContent  = cfg.barIcon;
    document.getElementById('bottom-label').textContent = cfg.barLabel;
    if (cfg.theme === 'light') document.body.classList.add('light');
    if (cfg.theme === 'glass') document.body.classList.add('glass');

    const GOAL_TARGET = cfg.goals.length
        ? Math.max(...cfg.goals.map(g => g.threshold))
        : 0;

    // Sort goals descending by threshold
    cfg.goals.sort((a, b) => a.threshold - b.threshold);

    // Persist amount across reloads, seeded with startAmount on first visit
    let currentAmount = parseFloat(localStorage.getItem('goalAmount') ?? cfg.startAmount);

    // ── RENDER GOALS ───────────────────────────────────────────
    const widget   = document.getElementById('widget');
    const bottomBar = widget.querySelector('.bar-wrapper');

    cfg.goals.forEach((goal, i) => {
        const row = document.createElement('div');
        row.className = 'goal-row';
        row.dataset.threshold = goal.threshold;
        row.style.animationDelay = (i * 0.07) + 's';
        row.innerHTML = `
            <div class="radio"><div class="radio-inner"></div></div>
            <span class="goal-label">${goal.label}</span>
            <span class="goal-amount">${goal.threshold}</span>
            <div class="thank-you">${cfg.thankYouText}</div>
        `;
        widget.insertBefore(row, bottomBar);
    });

    // ── GAIN ANIMATION ─────────────────────────────────────────
    function showGain(gain) {
        const bubble = document.getElementById('gain-bubble');
        bubble.textContent = '+' + (Number.isInteger(gain) ? gain : gain.toFixed(2)) + ' ' + cfg.currency;
        bubble.classList.add('visible');
        clearTimeout(bubble._hideTimer);
        bubble._hideTimer = setTimeout(() => bubble.classList.remove('visible'), 3000);

        const amountEl = document.getElementById('bottom-amount');
        amountEl.classList.remove('amount-pop');
        void amountEl.offsetWidth;
        amountEl.classList.add('amount-pop');
        amountEl.addEventListener('animationend', () => amountEl.classList.remove('amount-pop'), { once: true });
    }

    const triggeredGoals = new Set();

    // ── UPDATE UI ──────────────────────────────────────────────
    function updateWidget() {
        localStorage.setItem('goalAmount', currentAmount);

        const pct = GOAL_TARGET ? Math.min((currentAmount / GOAL_TARGET) * 100, 100) : 0;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('bottom-amount').textContent =
            cfg.currency + ' ' + Math.floor(currentAmount) + ' / ' + GOAL_TARGET;

        // Find the single next goal to reach (lowest undone threshold)
        const rows = [...document.querySelectorAll('.goal-row')];
        const nextThreshold = rows
            .map(r => parseFloat(r.dataset.threshold))
            .filter(t => currentAmount < t)
            .reduce((min, t) => (t < min ? t : min), Infinity);

        rows.forEach(row => {
            const threshold = parseFloat(row.dataset.threshold);
            const bubble    = row.querySelector('.thank-you');
            const pct       = Math.min((currentAmount / threshold) * 100, 100).toFixed(1) + '%';

            row.style.setProperty('--progress', pct);

            if (currentAmount >= threshold) {
                row.classList.remove('near');
                row.classList.add('done');

                if (!triggeredGoals.has(threshold)) {
                    triggeredGoals.add(threshold);
                    bubble.classList.add('visible');
                    clearTimeout(bubble._hideTimer);
                    bubble._hideTimer = setTimeout(() => {
                        bubble.classList.remove('visible');
                    }, 10000);
                    launchConfetti(row);
                }
            } else if (threshold === nextThreshold && currentAmount >= threshold * 0.8) {
                row.classList.remove('done');
                row.classList.add('near');
            } else {
                row.classList.remove('done', 'near');
            }
        });
    }

    updateWidget();

    // ── CONFETTI ───────────────────────────────────────────────
    const COLORS = [
        cfg.accentColor, '#fff', '#ff6b9d', '#6bcbff', '#a8ff78', '#ffb347', '#c77dff'
    ];

    function launchConfetti(originEl) {
        const count = 80;
        for (let i = 0; i < count; i++) {
            const el    = document.createElement('div');
            el.className = 'confetti-piece';

            const color  = COLORS[Math.floor(Math.random() * COLORS.length)];
            const size   = 6 + Math.random() * 8;
            const angle  = Math.random() * Math.PI * 2;
            const spread = 80 + Math.random() * 160;
            const tx     = Math.cos(angle) * spread;
            const ty     = Math.sin(angle) * spread - 80; // bias upward
            const dur    = 10 + Math.random() * 5;
            const delay  = Math.random() * 0.3;
            const shape  = Math.random() > 0.5 ? '50%' : '2px';

            el.style.cssText = `
                left: calc(50% + ${tx}px);
                top:  calc(50% + ${ty}px);
                width: ${size}px;
                height: ${size * (0.4 + Math.random() * 0.8)}px;
                background: ${color};
                border-radius: ${shape};
                animation-duration: ${dur}s;
                animation-delay: ${delay}s;
            `;
            originEl.appendChild(el);
            el.addEventListener('animationend', () => el.remove());
        }
    }

    // ── STREAMLABS SOCKET ──────────────────────────────────────
    function showDonor(name, type) {
        const tag   = document.getElementById('donor-tag');
        const label = document.getElementById('bottom-label');
        const icon  = type === 'sub' ? cfg.subEmoji : cfg.donationEmoji;
        tag.textContent = icon + ' ' + name;
        label.classList.add('hidden');
        tag.classList.add('visible');
        clearTimeout(tag._hideTimer);
        tag._hideTimer = setTimeout(() => {
            tag.classList.remove('visible');
            label.classList.remove('hidden');
        }, 5000);
    }

    if (cfg.token) {
        const streamlabs = io(`https://sockets.streamlabs.com?token=${cfg.token}`, { transports: ['websocket'] });

        streamlabs.on('event', (eventData) => {
            let gain = 0;
            if (eventData.type === 'donation') {
                eventData.message.forEach(msg => {
                    const amt = parseFloat(msg.amount);
                    currentAmount += amt;
                    gain += amt;
                    if (msg.from || msg.name) showDonor(msg.from || msg.name, 'donation');
                });
            }
            if (eventData.for === 'twitch_account' || eventData.for === 'youtube_account') {
                if (eventData.type === 'subscription' || eventData.type === 'resub') {
                    eventData.message.forEach(msg => {
                        currentAmount += cfg.subValue;
                        gain += cfg.subValue;
                        if (msg.name) showDonor(msg.name, 'sub');
                    });
                }
            }
            if (gain > 0) showGain(gain);
            updateWidget();
        });
    }

</script>
</body>
</html>
