<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: transparent;
            overflow: hidden;
            padding: 16px;
            width: 480px;
        }

        .widget {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── Goal Row ── */
        .goal-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50px;
            padding: 10px 20px 10px 14px;
            animation: fadeSlideIn 0.4s ease both;
            position: relative;
            overflow: visible;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateX(-18px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .goal-row.done {
            background: rgba(255,255,255,0.10);
        }

        .goal-row.done .goal-label {
            text-decoration: line-through;
            opacity: 0.55;
        }

        /* Radio circle */
        .radio {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.35);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .goal-row.done .radio {
            border-color: #f6c90e;
            background: rgba(246,201,14,0.13);
        }

        .radio-inner {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f6c90e;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: scale(0.4);
        }

        .goal-row.done .radio-inner {
            opacity: 1;
            transform: scale(1);
        }

        /* Label */
        .goal-label {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Amount badge */
        .goal-amount {
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            opacity: 0.9;
            white-space: nowrap;
        }

        /* Thank You bubble */
        .thank-you {
            position: absolute;
            right: 70px;
            top: -22px;
            background: white;
            color: #333;
            font-size: 12px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 12px;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            pointer-events: none;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.3s, transform 0.3s;
        }

        .thank-you::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-bottom: none;
            border-top-color: white;
        }

        .thank-you.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Bottom Bar ── */
        .bottom-bar {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, #f6c90e, #f0a500);
            border-radius: 50px;
            padding: 10px 8px 10px 16px;
            gap: 12px;
            animation: fadeSlideIn 0.4s ease 0.35s both;
            margin-top: 2px;
            position: relative;
            overflow: hidden;
        }

        .bottom-icon {
            font-size: 22px;
            line-height: 1;
        }

        .bottom-label {
            flex: 1;
            font-size: 15px;
            font-weight: 900;
            color: #2d1a00;
            letter-spacing: 0.02em;
        }

        .bottom-amount {
            background: rgba(0,0,0,0.18);
            border-radius: 50px;
            padding: 6px 18px;
            font-size: 16px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.02em;
        }

        /* Thin progress line at bottom of bar */
        .progress-wrap {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 4px;
            background: rgba(0,0,0,0.15);
        }

        .progress-fill {
            height: 100%;
            background: rgba(255,255,255,0.45);
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
<div class="widget" id="widget">
    <!-- Goals are rendered by JS from the ?config= param -->

    <div class="bottom-bar">
        <span class="bottom-icon">🏆</span>
        <span class="bottom-label">Community Goals</span>
        <span class="bottom-amount" id="bottom-amount">BC0 / 0</span>
        <div class="progress-wrap">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
    </div>
</div>

<script>
    // ── CONFIG ─────────────────────────────────────────────────
    // Pass config as a base64-encoded JSON string in the URL:
    //   ?config=<base64(JSON)>
    //
    // Config shape:
    // {
    //   "token":       "YOUR_STREAMLABS_TOKEN",
    //   "startAmount": 0,          // pre-seed the counter (default: 0)
    //   "subValue":    5,          // $ value per subscription (default: 5)
    //   "goals": [
    //     { "label": "Play Horror Game", "threshold": 200 },
    //     { "label": "Dye Hair",         "threshold": 500 }
    //   ]
    // }
    //
    // goalTarget is derived automatically from the highest threshold.
    //
    // Generate the base64 string at https://twitch.elyth.xyz/config

    const DEFAULTS = {
        token:       '',
        startAmount: 0,
        subValue:    5,
        goals:       [],
    };

    function loadConfig() {
        const raw = new URLSearchParams(window.location.search).get('config');
        if (!raw) return DEFAULTS;
        try {
            return { ...DEFAULTS, ...JSON.parse(atob(raw)) };
        } catch (e) {
            console.error('Invalid config param:', e);
            return DEFAULTS;
        }
    }

    const cfg        = loadConfig();
    const GOAL_TARGET = cfg.goals.length
        ? Math.max(...cfg.goals.map(g => g.threshold))
        : 0;

    // Persist amount across reloads, seeded with startAmount on first visit
    let currentAmount = parseFloat(localStorage.getItem('goalAmount') ?? cfg.startAmount);

    // ── RENDER GOALS ───────────────────────────────────────────
    const widget   = document.getElementById('widget');
    const bottomBar = widget.querySelector('.bottom-bar');

    cfg.goals.forEach((goal, i) => {
        const row = document.createElement('div');
        row.className = 'goal-row';
        row.dataset.threshold = goal.threshold;
        row.style.animationDelay = (i * 0.07) + 's';
        row.innerHTML = `
            <div class="radio"><div class="radio-inner"></div></div>
            <span class="goal-label">${goal.label}</span>
            <span class="goal-amount">BC${goal.threshold}</span>
            <div class="thank-you"></div>
        `;
        widget.insertBefore(row, bottomBar);
    });

    // ── UPDATE UI ──────────────────────────────────────────────
    function updateWidget() {
        localStorage.setItem('goalAmount', currentAmount);

        const pct = GOAL_TARGET ? Math.min((currentAmount / GOAL_TARGET) * 100, 100) : 0;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('bottom-amount').textContent =
            'BC' + Math.floor(currentAmount) + ' / ' + GOAL_TARGET;

        let latestDone = null;
        document.querySelectorAll('.goal-row').forEach(row => {
            const threshold = parseFloat(row.dataset.threshold);
            const bubble    = row.querySelector('.thank-you');
            bubble.classList.remove('visible');

            if (currentAmount >= threshold) {
                row.classList.add('done');
                latestDone = { row, bubble };
            } else {
                row.classList.remove('done');
            }
        });

        if (latestDone) latestDone.bubble.classList.add('visible');
    }

    updateWidget();

    // ── STREAMLABS SOCKET ──────────────────────────────────────
    if (cfg.token) {
        const streamlabs = io(`https://sockets.streamlabs.com?token=${cfg.token}`, { transports: ['websocket'] });

        streamlabs.on('event', (eventData) => {
            if (eventData.type === 'donation') {
                eventData.message.forEach(msg => {
                    currentAmount += parseFloat(msg.amount);
                });
            }
            if (eventData.for === 'twitch_account' || eventData.for === 'youtube_account') {
                if (eventData.type === 'subscription' || eventData.type === 'resub') {
                    eventData.message.forEach(() => { currentAmount += cfg.subValue; });
                }
            }
            updateWidget();
        });
    }
</script>
</body>
</html>
