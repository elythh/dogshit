<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BooKyy Donathon</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #0f0f13;
            color: #e8e8f0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .layout {
            max-width: 1180px;
            margin: 0 auto;
            display: flex;
            gap: 28px;
            align-items: flex-start;
            padding: 0;
        }

        .config-col {
            flex: 0 0 580px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            min-width: 0;
        }

        .preview-col {
            flex: 0 0 512px;
            position: sticky;
            top: 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @media (max-width: 1100px) {
            .layout { flex-direction: column; }
            .preview-col { position: static; flex: none; width: 100%; }
        }

        .preview-wrap {
            width: 480px;
            background: #111118;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .preview-wrap iframe {
            display: block;
            width: 480px;
            height: 500px;
            border: none;
            background: transparent;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: #f6c90e;
        }

        h1 span {
            color: #fff;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .card-title {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
        }

        .field label a {
            color: #f6c90e;
            text-decoration: none;
            font-weight: 700;
        }

        .field label a:hover {
            text-decoration: underline;
        }

        .field input {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        .field input:focus {
            border-color: #f6c90e;
        }

        .field input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .field { flex: 1; }

        /* Goals list */
        #goals-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .goal-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .goal-item input[type="text"] {
            flex: 1;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .goal-item input[type="text"]:focus { border-color: #f6c90e; }
        .goal-item input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }

        .goal-item input[type="number"] {
            width: 90px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }

        .goal-item input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .goal-item input[type="number"]:focus { border-color: #f6c90e; }
        .goal-item input[type="number"]::placeholder { color: rgba(255,255,255,0.2); }

        .drag-handle {
            cursor: grab;
            color: rgba(255,255,255,0.2);
            font-size: 18px;
            flex-shrink: 0;
            padding: 0 2px;
            user-select: none;
            line-height: 1;
        }

        .drag-handle:active { cursor: grabbing; }

        .goal-item.dragging {
            opacity: 0.35;
        }

        .btn-remove {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            background: transparent;
            color: rgba(255,255,255,0.35);
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-remove:hover {
            background: rgba(255,80,80,0.15);
            color: #ff6b6b;
            border-color: rgba(255,80,80,0.3);
        }

        /* ── Theme controls ── */
        .color-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="color"] {
            width: 48px;
            height: 38px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: none;
            cursor: pointer;
            padding: 2px;
            flex-shrink: 0;
        }

        .color-hex {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
        }

        .range-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            cursor: pointer;
            accent-color: #f6c90e;
        }

        .range-value {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            min-width: 48px;
            text-align: right;
        }

        /* Theme toggle */
        .theme-toggle {
            display: flex;
            gap: 0;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 3px;
        }

        .btn-theme {
            flex: 1;
            padding: 7px 12px;
            border-radius: 7px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 13px;
            font-weight: 800;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .btn-theme.active {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        .btn-add {
            align-self: flex-start;
            background: transparent;
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-add:hover {
            border-color: #f6c90e;
            color: #f6c90e;
        }

        /* Output */
        .output-box {
            position: relative;
        }

        .url-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .url-row > div { flex: 1; min-width: 0; }

        .btn-copy-url {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.1);
            font-family: inherit;
            font-size: 13px;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-copy-url:hover { background: rgba(255,255,255,0.18); }
        .btn-copy-url.copied { background: rgba(76,175,125,0.3); color: #4caf7d; }

        .output-label {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 8px;
        }

        textarea#output {
            width: 100%;
            min-height: 90px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #a8e6a3;
            resize: vertical;
            outline: none;
            word-break: break-all;
        }

        .url-preview {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            word-break: break-all;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px 12px;
        }

        .url-preview span {
            color: #f6c90e;
        }

        .btn-copy {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #f6c90e, #f0a500);
            font-family: inherit;
            font-size: 15px;
            font-weight: 900;
            color: #2d1a00;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.02em;
        }

        .btn-copy:hover { opacity: 0.92; }
        .btn-copy:active { transform: scale(0.98); }
        .btn-copy.copied { background: linear-gradient(90deg, #4caf7d, #3a9463); color: #fff; }
    </style>
</head>
<body>
<div class="layout">
    <div class="config-col">
        <h1>🏆 BooKyy <span>Donathon</span></h1>


    <!-- Settings -->
    <div class="card">
        <div class="card-title">Paramètres</div>

        <div class="field">
            <label for="token">
                Streamlabs Socket Token —
                <a href="https://streamlabs.com/dashboard#/settings/api-settings" target="_blank" rel="noopener">obtenir le token</a>
            </label>
            <div style="display:flex; gap:8px; align-items:center">
                <input type="text" id="token" placeholder="Collez votre token ici…" style="flex:1">
                <button id="btn-hide-token" type="button" title="Cacher le token" style="
                    flex-shrink:0; padding:8px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.12);
                    background:rgba(255,255,255,0.07); font-family:inherit; font-size:13px; font-weight:700;
                    color:rgba(255,255,255,0.6); cursor:pointer; transition:background 0.2s, color 0.2s;
                    white-space:nowrap;
                ">👁 Cacher</button>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label for="startAmount">Montant de départ (BC)</label>
                <input type="number" id="startAmount" placeholder="0" min="0" value="0">
            </div>
            <div class="field">
                <label for="subValue">Valeur d'un sub (BC)</label>
                <input type="number" id="subValue" placeholder="5" min="0" value="5">
            </div>
        </div>
    </div>

    <!-- Textes -->
    <div class="card">
        <div class="card-title">Textes</div>

        <div class="row">
            <div class="field" style="flex:0 0 72px">
                <label for="barIcon">Icône</label>
                <input type="text" id="barIcon" value="🏆" maxlength="4">
            </div>
            <div class="field">
                <label for="barLabel">Titre de la barre</label>
                <input type="text" id="barLabel" value="Objectifs communautaires">
            </div>
        </div>

        <div class="row">
            <div class="field" style="flex:0 0 100px">
                <label for="currency">Monnaie</label>
                <input type="text" id="currency" value="BC" maxlength="8">
            </div>
            <div class="field">
                <label for="thankYouText">Bulle "merci"</label>
                <input type="text" id="thankYouText" value="Merci !" placeholder="Merci !">
            </div>
        </div>
    </div>

    <!-- Thème -->
    <div class="card">
        <div class="card-title">Thème</div>

        <div class="field">
            <label for="accentColor">Couleur d'accentuation</label>
            <div class="color-row">
                <input type="color" id="accentColor" value="#f6c90e">
                <span class="color-hex" id="accentColorHex">#f6c90e</span>
            </div>
        </div>

        <div class="field">
            <label for="borderRadius">Rondeur des bordures</label>
            <div class="range-row">
                <input type="range" id="borderRadius" min="0" max="50" value="50">
                <span class="range-value" id="borderRadiusValue">50 px</span>
            </div>
        </div>

        <div class="field">
            <label for="fontSize">Taille du texte</label>
            <div class="range-row">
                <input type="range" id="fontSize" min="10" max="26" value="15">
                <span class="range-value" id="fontSizeValue">15 px</span>
            </div>
        </div>

        <div class="field">
            <label for="widgetWidth">Largeur du widget</label>
            <div class="range-row">
                <input type="range" id="widgetWidth" min="280" max="800" value="480">
                <span class="range-value" id="widgetWidthValue">480 px</span>
            </div>
        </div>

        <div class="field">
            <label for="rowGap">Espacement entre les lignes</label>
            <div class="range-row">
                <input type="range" id="rowGap" min="2" max="28" value="10">
                <span class="range-value" id="rowGapValue">10 px</span>
            </div>
        </div>

        <div class="field">
            <label for="scale">Échelle globale du widget</label>
            <div class="range-row">
                <input type="range" id="scale" min="0.5" max="3" step="0.05" value="1">
                <span class="range-value" id="scaleValue">×1.00</span>
            </div>
        </div>

        <div class="field">
            <label>Mode</label>
            <div class="theme-toggle">
                <button class="btn-theme active" id="btn-theme-dark"  data-theme="dark">🌙 Sombre</button>
                <button class="btn-theme"        id="btn-theme-light" data-theme="light">☀️ Clair</button>
            </div>
        </div>
    </div>

    <!-- Goals -->
    <div class="card">
        <div class="card-title">Objectifs</div>

        <div id="goals-list"></div>

        <button class="btn-add" id="btn-add">+ Ajouter un objectif</button>
    </div>

    <!-- Output -->
    <div class="card">
        <div class="card-title">Résultat</div>

        <div class="output-box">
            <div class="output-label" style="display:flex;align-items:center;justify-content:space-between">
                <span>Config base64</span>
                <div style="display:flex;gap:8px">
                    <button class="btn-copy-url" id="btn-reveal-b64">👁 Révéler</button>
                    <button class="btn-copy-url" id="btn-copy-b64">Copier</button>
                </div>
            </div>
            <textarea id="output" readonly style="filter:blur(5px);user-select:none;transition:filter 0.3s"></textarea>
        </div>

        <div style="display:flex;gap:8px">
            <button class="btn-copy-url" id="btn-copy-full" style="flex:1">Copier — Widget complet</button>
            <button class="btn-copy-url" id="btn-copy-bar"  style="flex:1">Copier — Barre</button>
        </div>

        <div style="display:flex; gap:8px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.07)">
            <button class="btn-copy-url" id="btn-copy-reset-full" style="flex:1">↺ Reset — Widget complet</button>
            <button class="btn-copy-url" id="btn-copy-reset-bar"  style="flex:1">↺ Reset — Barre</button>
        </div>
        <span id="url-full"       style="display:none"></span>
        <span id="url-bar"        style="display:none"></span>
        <span id="url-reset-full" style="display:none"></span>
        <span id="url-reset-bar"  style="display:none"></span>
    </div>

    </div>
    <div class="preview-col">
        <div class="card">
            <div class="card-title">Aperçu en direct</div>
            <div class="preview-wrap">
                <iframe id="preview" scrolling="no"></iframe>
            </div>
            <div class="field">
                <label for="liveAmount">Montant actuel</label>
                <input type="number" id="liveAmount" min="0" value="0">
            </div>
        </div>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);
    let previewTimer;

    // ── Token visibility toggle ────────────────────────────────
    let tokenHidden = false;
    $('btn-hide-token').addEventListener('click', () => {
        tokenHidden = !tokenHidden;
        $('token').style.filter      = tokenHidden ? 'blur(6px)' : '';
        $('token').style.userSelect  = tokenHidden ? 'none' : '';
        $('btn-hide-token').textContent = tokenHidden ? '👁 Afficher' : '👁 Cacher';
    });

    // ── Base64 reveal toggle ───────────────────────────────────
    let b64Revealed = false;
    $('btn-reveal-b64').addEventListener('click', () => {
        b64Revealed = !b64Revealed;
        $('output').style.filter     = b64Revealed ? '' : 'blur(5px)';
        $('output').style.userSelect = b64Revealed ? '' : 'none';
        $('btn-reveal-b64').textContent = b64Revealed ? '👁 Cacher' : '👁 Révéler';
    });

    // ── Goal rows ──────────────────────────────────────────────
    // ── Drag-and-drop ──────────────────────────────────────────
    let dragSrc = null;

    function onDragStart(e) {
        dragSrc = this;
        e.dataTransfer.effectAllowed = 'move';
        this.classList.add('dragging');
    }

    function onDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const list = $('goals-list');
        const dragging = list.querySelector('.dragging');
        if (!dragging || this === dragging) return;
        const rect = this.getBoundingClientRect();
        if (e.clientY < rect.top + rect.height / 2) {
            list.insertBefore(dragging, this);
        } else {
            list.insertBefore(dragging, this.nextSibling);
        }
    }

    function onDragEnd() {
        this.classList.remove('dragging');
        dragSrc = null;
        generate();
    }

    function makeGoalRow(label = '', threshold = '') {
        const item = document.createElement('div');
        item.className = 'goal-item';
        item.draggable = true;
        item.innerHTML = `
            <span class="drag-handle">⠿</span>
            <input type="text"   placeholder="Intitulé de l'objectif…" value="${label}">
            <input type="number" placeholder="100" min="0" value="${threshold}">
            <button class="btn-remove" title="Remove">×</button>
        `;
        item.addEventListener('dragstart', onDragStart);
        item.addEventListener('dragover',  onDragOver);
        item.addEventListener('dragend',   onDragEnd);
        item.querySelector('.btn-remove').addEventListener('click', () => {
            item.remove();
            generate();
        });
        item.querySelectorAll('input[type="text"], input[type="number"]').forEach(el => el.addEventListener('input', generate));
        return item;
    }

    function addGoal(label, threshold) {
        $('goals-list').appendChild(makeGoalRow(label, threshold));
        generate();
    }

    $('btn-add').addEventListener('click', () => addGoal());

    // ── Theme toggle ───────────────────────────────────────────
    let currentTheme = 'dark';

    document.querySelectorAll('.btn-theme').forEach(btn => {
        btn.addEventListener('click', () => {
            currentTheme = btn.dataset.theme;
            document.querySelectorAll('.btn-theme').forEach(b => b.classList.toggle('active', b === btn));
            generate();
        });
    });

    // ── Generate ───────────────────────────────────────────────
    function generate() {
        const accent = $('accentColor').value;
        const radius = Number($('borderRadius').value);
        const fontSize    = Number($('fontSize').value);
        const widgetWidth = Number($('widgetWidth').value);
        const rowGap      = Number($('rowGap').value);
        const scale       = Number($('scale').value);

        // Update live displays
        $('accentColorHex').textContent     = accent;
        $('borderRadiusValue').textContent  = radius + ' px';
        $('borderRadius').style.accentColor = accent;
        $('fontSizeValue').textContent      = fontSize    + ' px';
        $('widgetWidthValue').textContent   = widgetWidth + ' px';
        $('rowGapValue').textContent        = rowGap      + ' px';
        $('scaleValue').textContent         = '×' + scale.toFixed(2);

        const goals = [...$('goals-list').querySelectorAll('.goal-item')].map(item => {
            const [labelEl, thresholdEl] = item.querySelectorAll('input[type="text"], input[type="number"]');
            return { label: labelEl.value.trim(), threshold: Number(thresholdEl.value) || 0 };
        }).filter(g => g.label);

        const cfg = {
            token:        $('token').value.trim(),
            startAmount:  Number($('startAmount').value) || 0,
            subValue:     Number($('subValue').value) || 5,
            accentColor:  accent,
            borderRadius: radius,
            fontSize,
            widgetWidth,
            rowGap,
            scale,
            barIcon:      $('barIcon').value.trim()      || '🏆',
            barLabel:     $('barLabel').value.trim()     || 'Objectifs communautaires',
            currency:     $('currency').value.trim()     || 'BC',
            thankYouText: $('thankYouText').value.trim() || 'Merci !',
            theme:        currentTheme,
            goals,
        };

        const b64 = btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(cfg))))
            .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        $('output').value              = b64;
        $('url-full').textContent      = b64;
        $('url-bar').textContent       = b64;
        $('url-reset-full').textContent = b64;
        $('url-reset-bar').textContent  = b64;
        localStorage.setItem('widgetConfig', b64);
        refreshPreview();
    }

    // Wire up settings inputs
    ['token', 'startAmount', 'subValue', 'accentColor', 'borderRadius',
     'fontSize', 'widgetWidth', 'rowGap', 'scale',
     'barIcon', 'barLabel', 'currency', 'thankYouText'].forEach(id => {
        $(id).addEventListener('input', generate);
    });

    // Restore last session BEFORE the first generate() so it doesn't overwrite the saved config
    const saved = localStorage.getItem('widgetConfig');
    if (saved) applyConfig(saved);

    generate();

    // ── Preview ────────────────────────────────────────────────
    function refreshPreview() {
        clearTimeout(previewTimer);
        previewTimer = setTimeout(() => {
            $('preview').src = '/widget?config=' + $('output').value;
        }, 400);
    }

    // ── Live amount ────────────────────────────────────────────
    $('liveAmount').value = parseFloat(localStorage.getItem('goalAmount') || 0);
    $('liveAmount').addEventListener('input', () => {
        localStorage.setItem('goalAmount', $('liveAmount').value);
        refreshPreview();
    });

    // ── Copy URL buttons ───────────────────────────────────────
    function copyText(text) {
        if (navigator.clipboard?.writeText) {
            return navigator.clipboard.writeText(text);
        }
        // Fallback for HTTP / restricted contexts
        const tmp = document.createElement('textarea');
        tmp.value = text;
        tmp.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand('copy');
        document.body.removeChild(tmp);
        return Promise.resolve();
    }

    function makeCopyUrl(btnId, getUrl) {
        $(btnId).addEventListener('click', async () => {
            const btn = $(btnId);
            const orig = btn.textContent;
            try {
                await copyText(getUrl());
                btn.textContent = '✓';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
            } catch {
                btn.textContent = 'Erreur';
                setTimeout(() => { btn.textContent = orig; }, 2000);
            }
        });
    }

    makeCopyUrl('btn-copy-b64',        () => $('output').value);
    makeCopyUrl('btn-copy-full',       () => 'https://twitch.elyth.xyz/widget?config='        + $('output').value);
    makeCopyUrl('btn-copy-bar',        () => 'https://twitch.elyth.xyz/bar?config='           + $('output').value);
    makeCopyUrl('btn-copy-reset-full', () => 'https://twitch.elyth.xyz/widget?reset&config='  + $('output').value);
    makeCopyUrl('btn-copy-reset-bar',  () => 'https://twitch.elyth.xyz/bar?reset&config='     + $('output').value);

    // ── Import / restore ───────────────────────────────────────
    function applyConfig(raw) {
        let cfg;
        try {
            const s = raw.replace(/-/g, '+').replace(/_/g, '/');
            const std = s + '='.repeat((4 - s.length % 4) % 4);
            cfg = JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(std), c => c.charCodeAt(0))));
        } catch {
            return false;
        }

        if (cfg.token        !== undefined) $('token').value        = cfg.token;
        if (cfg.startAmount  !== undefined) $('startAmount').value  = cfg.startAmount;
        if (cfg.subValue     !== undefined) $('subValue').value     = cfg.subValue;
        if (cfg.accentColor  !== undefined) $('accentColor').value  = cfg.accentColor;
        if (cfg.borderRadius !== undefined) $('borderRadius').value = cfg.borderRadius;
        if (cfg.fontSize     !== undefined) $('fontSize').value     = cfg.fontSize;
        if (cfg.widgetWidth  !== undefined) $('widgetWidth').value  = cfg.widgetWidth;
        if (cfg.rowGap       !== undefined) $('rowGap').value       = cfg.rowGap;
        if (cfg.scale        !== undefined) $('scale').value        = cfg.scale;
        if (cfg.barIcon      !== undefined) $('barIcon').value      = cfg.barIcon;
        if (cfg.barLabel     !== undefined) $('barLabel').value     = cfg.barLabel;
        if (cfg.currency     !== undefined) $('currency').value     = cfg.currency;
        if (cfg.thankYouText !== undefined) $('thankYouText').value = cfg.thankYouText;
        if (cfg.theme !== undefined) {
            currentTheme = cfg.theme;
            document.querySelectorAll('.btn-theme').forEach(b => {
                b.classList.toggle('active', b.dataset.theme === cfg.theme);
            });
        }

        if (Array.isArray(cfg.goals)) {
            $('goals-list').innerHTML = '';
            cfg.goals.forEach(g => addGoal(g.label, g.threshold));
        }
        return true;
    }

</script>
